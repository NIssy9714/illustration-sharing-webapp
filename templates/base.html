<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{{ title }}</title>
</head>
<body>
    <header>
        <a href="{{ url_for('home') }}">TOP</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('upload') }}">投稿</a>
            <a href="{{ url_for('logout') }}">ログアウト</a>
        {% else %}
            <a href="{{ url_for('login') }}">ログイン</a>
            <a href="{{ url_for('register') }}">新規登録</a>
        {% endif %}
        <form action="{{ url_for('search') }}" method="GET" class="search-form" style="display:inline-block; margin-left: 1rem;">
            <label for="search_query">検索:</label>
            <input
                type="text"
                id="search_query"
                name="search_query"
                placeholder="タイトルで検索"
                value="{{ search_keyword if search_keyword is defined else '' }}"
            >
            <button type="submit">検索</button>
        </form>
    </header>
    <hr>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul class="flashes">
                {% for msg in messages %}
                    <li style="color: red;">{{ msg }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
